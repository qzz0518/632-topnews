<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS / TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<main class="device-panel">

    <header class="panel-header">
        <div class="brand">NEWS / TERMINAL</div>
        <div class="header-controls">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                <span class="toggle-track"><span class="toggle-knob"></span></span>
                <span class="toggle-label" id="theme-label">LT</span>
            </button>
            <div class="model-number">SYS.01</div>
        </div>
    </header>

    <!-- CRT Display Screen -->
    <section class="display-section">
        <div class="display-screen">
            <div class="screen-header">
                <span class="screen-dot" id="screen-dot"></span>
                <span class="screen-label">LIVE FEED</span>
                <span class="screen-status" id="feed-status">STANDBY</span>
            </div>
            <div class="screen-content" id="news-ticker">
                <span class="prompt">&gt;</span> Initializing feed...
            </div>
            <div class="screen-progress">
                <div class="progress-fill" id="refresh-progress"></div>
            </div>
        </div>
    </section>

    <!-- Region Hardware Buttons -->
    <section class="controls-section">
        <div class="control-group">
            <span class="control-label">CN-30</span>
            <button class="hardware-btn btn-red" data-region="cn" aria-label="China News">
                <div class="btn-well"><div class="btn-cap">
                    <svg class="btn-flag" viewBox="0 0 40 40"><polygon points="20,9 22.9,16 30,16.8 24.5,21.5 26.2,28.5 20,24.5 13.8,28.5 15.5,21.5 10,16.8 17.1,16" fill="rgba(255,215,0,0.5)"/></svg>
                </div></div>
            </button>
        </div>
        <div class="control-group">
            <span class="control-label">JP-55</span>
            <button class="hardware-btn btn-blue" data-region="jp" aria-label="Japan News">
                <div class="btn-well"><div class="btn-cap">
                    <svg class="btn-flag" viewBox="0 0 40 40"><circle cx="20" cy="20" r="8.5" fill="rgba(255,255,255,0.22)"/></svg>
                </div></div>
            </button>
        </div>
        <div class="control-group">
            <span class="control-label">US-A9</span>
            <button class="hardware-btn btn-yellow" data-region="us" aria-label="USA News">
                <div class="btn-well"><div class="btn-cap">
                    <svg class="btn-flag" viewBox="0 0 40 40"><polygon points="20,8 22,14 28,14.5 23.5,18.5 25,24.5 20,21 15,24.5 16.5,18.5 12,14.5 18,14" fill="rgba(255,255,255,0.35)"/><rect x="7" y="27" width="26" height="2.2" rx="1" fill="rgba(255,255,255,0.28)"/><rect x="10" y="31" width="20" height="2.2" rx="1" fill="rgba(255,255,255,0.22)"/></svg>
                </div></div>
            </button>
        </div>
        <div class="control-group">
            <span class="control-label">UK-85</span>
            <button class="hardware-btn btn-green" data-region="uk" aria-label="UK News">
                <div class="btn-well"><div class="btn-cap">
                    <svg class="btn-flag" viewBox="0 0 40 40"><line x1="6" y1="6" x2="34" y2="34" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/><line x1="34" y1="6" x2="6" y2="34" stroke="rgba(255,255,255,0.18)" stroke-width="3" stroke-linecap="round"/><line x1="20" y1="3" x2="20" y2="37" stroke="rgba(255,255,255,0.28)" stroke-width="4.5" stroke-linecap="round"/><line x1="3" y1="20" x2="37" y2="20" stroke="rgba(255,255,255,0.28)" stroke-width="4.5" stroke-linecap="round"/></svg>
                </div></div>
            </button>
        </div>
        <div class="control-group">
            <span class="control-label">ALL-F4</span>
            <button class="hardware-btn btn-white is-active" data-region="all" aria-label="All News">
                <div class="btn-well"><div class="btn-cap">
                    <svg class="btn-flag" viewBox="0 0 40 40"><circle cx="20" cy="20" r="11" fill="none" stroke="rgba(0,0,0,0.13)" stroke-width="1.5"/><ellipse cx="20" cy="20" rx="5" ry="11" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/><line x1="9" y1="20" x2="31" y2="20" stroke="rgba(0,0,0,0.1)" stroke-width="1"/><line x1="9" y1="14" x2="31" y2="14" stroke="rgba(0,0,0,0.06)" stroke-width="0.8"/><line x1="9" y1="26" x2="31" y2="26" stroke="rgba(0,0,0,0.06)" stroke-width="0.8"/></svg>
                </div></div>
            </button>
        </div>
    </section>

    <!-- Category Tabs -->
    <section class="category-section">
        <button class="category-btn active" data-category="all">ALL</button>
        <button class="category-btn" data-category="tech">TECH</button>
        <button class="category-btn" data-category="business">BIZ</button>
        <button class="category-btn" data-category="sports">SPORT</button>
        <button class="category-btn" data-category="entertainment">ENT</button>
        <button class="category-btn" data-category="favorite">&#9733; FAV</button>
    </section>

    <div class="panel-divider"></div>

    <!-- News Feed -->
    <section class="feed-section">
        <div class="feed-header">
            <span class="feed-title">FEED</span>
            <span class="feed-count" id="feed-count">// 0 ITEMS</span>
        </div>
        <div class="feed-grid" id="news-grid">
            <div class="feed-loading" id="feed-loading">Connecting to data sources...</div>
        </div>
    </section>

    <footer class="panel-footer">
        <div class="footer-text">News-Katalog</div>
        <div class="model-number">NW-26</div>
    </footer>

</main>

<script type="module" src="/src/main.js"></script>
</body>
</html>
